<style>

<script type="text/babel">

    ['p18', P15_Tone], ['p19', P17_Audience], ['p20', P19_Closing],

  for (const [id, Comp] of mounts) {
    const el = document.getElementById(id);
    if (el) ReactDOM.createRoot(el).render(<Comp />);
  }
</script>
